services:

  web1:
    image: nginx:alpine
    container_name: web1
    volumes:
      - ./web1:/usr/share/nginx/html
    ports:
      - "8081:80"

  web2:
    image: nginx:alpine
    container_name: web2
    volumes:
      - ./web2:/usr/share/nginx/html
    ports:
      - "8082:80"

  db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: projet_b2
      MYSQL_USER: user_b2
      MYSQL_PASSWORD: pass1234
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backup:
    image: ubuntu:22.04
    container_name: backup_server
    volumes:
      - backup_data:/backups
      - ./web1:/backups/web1:ro
      - ./web2:/backups/web2:ro
    command: sleep infinity

volumes:
  backup_data:
  db_data: